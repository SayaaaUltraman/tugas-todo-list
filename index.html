<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <h2>To-Do List Saya</h2>

    <div>
        <input type="text" id="inputTugas" placeholder="Ketik tugas baru di sini...">
        <button onclick="tambahTugas()">Tambah</button>
    </div>

    <ul id="daftarTugas"></ul>

    <script>
        function tambahTugas() {
            let input = document.getElementById("inputTugas");
            let daftar = document.getElementById("daftarTugas");

            if (input.value === "") {
                alert("Tugas tidak boleh kosong!");
                return;
            }

            //Buat elemen list baru
            let li = document.createElement("li");
            li.textContent = input.value + " "; // Ditambah spasi agar tidak menempel dengan tombol
            
            //MULAI FITUR DELETE
            //Buat elemen tombol hapus
            let tombolHapus = document.createElement("button");
            tombolHapus.textContent = "Hapus";
            tombolHapus.style.color = "red"; // Sekedar pemanis agar teksnya merah
            
            // Fungsi ketika tombol hapus diklik
            tombolHapus.onclick = function() {
                daftar.removeChild(li); 
            };

            //Masukkan tombol hapus ke dalam baris tugas
            li.appendChild(tombolHapus);
            //AKHIR FITUR DELETE

            // Masukkan list beserta tombol hapusnya ke dalam halaman
            daftar.appendChild(li);
            
            //Ksongkan kotak input dan mengembalikan kursor
            input.value = ""; 
            input.focus(); 
        }
    </script>
</body>
</html>
